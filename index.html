<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=Teko:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#08080f;--bg2:#0f0f1c;--bg3:#14141f;--bg4:#1a1a2a;
  --text:#e8e8f0;--text2:#8888aa;--text3:#555577;
  --orange:#ff6b00;--orangedim:#ff6b0020;
  --green:#00ff88;--greendim:#00ff8820;
  --pink:#ff2d7a;--pinkdim:#ff2d7a20;
  --blue:#00d4ff;--bluedim:#00d4ff20;
  --red:#ff2020;--yellow:#ffd600;
  --border:#ffffff0f;--border2:#ffffff1a;
}
body{background:var(--bg);color:var(--text);font-family:'Space Mono',monospace;min-height:100vh;overflow-x:hidden}
#scanlines{position:fixed;inset:0;pointer-events:none;z-index:100;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.04) 2px,rgba(0,0,0,0.04) 4px)}

/* LANG MODAL */
.lang-modal{position:fixed;inset:0;z-index:10000;background:rgba(0,0,0,0.95);display:flex;align-items:center;justify-content:center;animation:fadeIn 0.3s ease}
.lang-modal.hide{display:none}
.lang-box{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;padding:2.5rem 2rem;max-width:360px;width:90%;text-align:center}
.lang-box-title{font-family:'Bebas Neue',sans-serif;font-size:2.5rem;letter-spacing:4px;background:linear-gradient(135deg,var(--orange),var(--yellow),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:0.3rem}
.lang-box-sub{font-size:0.55rem;color:var(--text3);letter-spacing:3px;text-transform:uppercase;margin-bottom:2rem}
.lang-choices{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.lang-choice{padding:1.25rem 1rem;border-radius:12px;cursor:pointer;transition:all 0.2s;border:1px solid var(--border2);background:var(--bg3)}
.lang-choice:hover{transform:translateY(-3px)}
.lang-choice.fr-choice{border-color:var(--orange)}.lang-choice.en-choice{border-color:var(--blue)}
.lang-choice:hover.fr-choice{background:var(--orangedim);box-shadow:0 0 20px rgba(255,107,0,0.2)}
.lang-choice:hover.en-choice{background:var(--bluedim);box-shadow:0 0 20px rgba(0,212,255,0.2)}
.lang-flag{font-size:3rem;display:block;margin-bottom:0.5rem}
.lang-name{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:3px}
.lang-choice.fr-choice .lang-name{color:var(--orange)}.lang-choice.en-choice .lang-name{color:var(--blue)}
.lang-sub{font-size:0.5rem;color:var(--text3);letter-spacing:1px;margin-top:0.2rem}

/* MINI TOGGLE — pill ultra compact */
.lang-toggle{
  position:fixed;top:8px;right:8px;z-index:500;
  display:flex;align-items:center;gap:2px;
  background:rgba(10,10,20,0.85);
  border:1px solid var(--border2);
  border-radius:20px;padding:3px 5px;
  backdrop-filter:blur(4px);
}
.lang-btn{
  font-size:0.65rem;width:24px;height:20px;
  display:flex;align-items:center;justify-content:center;
  border:none;border-radius:14px;cursor:pointer;
  background:transparent;color:var(--text3);
  transition:all 0.15s;line-height:1;padding:0;
}
.lang-btn.active{background:rgba(255,107,0,0.25);color:var(--orange)}
.lang-btn:hover:not(.active){color:var(--text2)}

/* GAME OVER */
.go-overlay{display:none;position:fixed;inset:0;z-index:9000;background:rgba(0,0,0,0.93);align-items:center;justify-content:center;padding:1rem}
.go-overlay.show{display:flex;animation:fadeIn 0.4s ease}
.go-box{border:2px solid var(--go-color,var(--red));border-radius:16px;padding:2rem;max-width:520px;width:100%;text-align:center;box-shadow:0 0 60px color-mix(in srgb,var(--go-color,var(--red)) 40%,transparent);animation:shake 0.5s ease;background:#080510}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
.go-gameover{font-family:'Bebas Neue',sans-serif;font-size:clamp(2.5rem,8vw,4rem);letter-spacing:6px;color:var(--go-color,var(--red));line-height:1;text-shadow:0 0 30px color-mix(in srgb,var(--go-color,var(--red)) 60%,transparent)}
.go-reason{font-family:'Bebas Neue',sans-serif;font-size:clamp(1rem,4vw,1.7rem);letter-spacing:3px;color:var(--go-color,var(--red));opacity:0.85;margin-top:0.2rem;margin-bottom:0.75rem;line-height:1.2}
.go-emoji{font-size:2.5rem;display:block;margin:0.75rem 0}
.go-story{font-size:0.76rem;line-height:1.9;color:var(--text);background:var(--bg3);border-radius:8px;padding:1rem;border:1px solid var(--border2);text-align:left;margin-bottom:1rem}
.go-story strong{color:var(--go-color,var(--red))}
.go-loss{font-family:'Teko',sans-serif;font-size:1.7rem;color:var(--go-color,var(--red));margin-bottom:1rem;letter-spacing:2px}
.go-btn{display:block;width:100%;padding:0.85rem;border:1px solid var(--text3);background:transparent;border-radius:8px;color:var(--text2);font-family:'Space Mono',monospace;font-size:0.62rem;cursor:pointer;text-transform:uppercase;letter-spacing:2px;transition:all 0.2s}
.go-btn:hover{border-color:var(--text);color:var(--text)}

header{text-align:center;padding:2rem 1rem 0.5rem}
.logo{font-family:'Bebas Neue',sans-serif;font-size:clamp(2.8rem,10vw,6.5rem);letter-spacing:5px;background:linear-gradient(135deg,var(--orange),var(--yellow),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 40px rgba(255,107,0,0.4));line-height:1}
.logo-sub{font-family:'Bebas Neue',sans-serif;font-size:clamp(0.9rem,2.5vw,1.5rem);letter-spacing:10px;color:var(--text3);margin-top:0.2rem}
.tagline{font-size:0.6rem;color:var(--text3);letter-spacing:3px;text-transform:uppercase;margin-top:0.4rem}
.badge{display:inline-block;font-size:0.5rem;background:var(--orangedim);border:1px solid var(--orange);color:var(--orange);padding:3px 10px;border-radius:4px;letter-spacing:2px;margin-top:0.5rem}

.modes{display:grid;grid-template-columns:repeat(2,1fr);gap:0.6rem;padding:1rem;max-width:920px;margin:0 auto}
@media(min-width:640px){.modes{grid-template-columns:repeat(4,1fr)}}
.mode-btn{padding:1rem 0.5rem;border:1px solid var(--border2);background:var(--bg3);border-radius:10px;cursor:pointer;transition:all 0.2s;text-align:center;font-family:'Space Mono',monospace;color:var(--text2)}
.mode-btn:hover{transform:translateY(-3px)}
.mode-btn .moji{font-size:2rem;display:block;margin-bottom:0.3rem}
.mode-btn .mlabel{font-size:0.58rem;letter-spacing:1px;text-transform:uppercase;line-height:1.4}
.mode-btn.mao{--c:var(--orange)}.mode-btn.nomad{--c:var(--green)}.mode-btn.issan{--c:var(--pink)}.mode-btn.sim{--c:var(--blue)}
.mode-btn.active{border-color:var(--c);background:linear-gradient(135deg,transparent,color-mix(in srgb,var(--c) 12%,transparent));color:var(--c)}
.mode-btn.active .moji{filter:drop-shadow(0 0 10px var(--c))}

.main{max-width:920px;margin:0 auto;padding:0 1rem 4rem}
.panel{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;padding:1.5rem;margin-bottom:1rem;display:none;animation:fadeIn 0.3s ease}
.panel.visible{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.ptitle{font-family:'Bebas Neue',sans-serif;font-size:1.9rem;letter-spacing:2px;margin-bottom:1.25rem}
.orange .ptitle{color:var(--orange)}.greenp .ptitle{color:var(--green)}.pinkp .ptitle{color:var(--pink)}.bluep .ptitle{color:var(--blue)}
.egrid{display:grid;grid-template-columns:1fr 1fr;gap:0.5rem}
@media(min-width:580px){.egrid{grid-template-columns:repeat(3,1fr)}}
.ecard{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:0.75rem}
.ecard.special{border-color:var(--pink);animation:pulseborder 2s ease-in-out infinite}
@keyframes pulseborder{0%,100%{box-shadow:0 0 0 rgba(255,45,122,0)}50%{box-shadow:0 0 12px rgba(255,45,122,0.3)}}
.ecat{font-size:0.55rem;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:0.2rem}
.eamt{font-family:'Teko',sans-serif;font-size:1.5rem;font-weight:600}
.edesc{font-size:0.58rem;color:var(--text2);margin-top:0.2rem;line-height:1.4}
.ewarn{font-size:0.52rem;color:var(--orange);margin-top:0.3rem}
.especial{font-size:0.52rem;color:var(--pink);margin-top:0.3rem;font-weight:700}
.orange .eamt{color:var(--orange)}.greenp .eamt{color:var(--green)}.pinkp .eamt{color:var(--pink)}
.buffalo-badge{display:inline-block;background:var(--pinkdim);border:1px solid var(--pink);color:var(--pink);font-size:0.5rem;padding:2px 6px;border-radius:4px;letter-spacing:1px;margin-top:0.4rem}
.total-bar{display:flex;justify-content:space-between;align-items:center;margin-top:1rem;padding:1rem;background:var(--bg4);border-radius:8px;border:1px solid var(--border2)}
.tlabel{font-size:0.65rem;color:var(--text2);text-transform:uppercase;letter-spacing:2px}
.tamt{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;letter-spacing:2px}
.disc{font-size:0.58rem;color:var(--text3);margin-top:0.4rem;font-style:italic;line-height:1.5}
.sim-section{margin-bottom:1.5rem}
.sim-label{font-size:0.6rem;color:var(--text2);text-transform:uppercase;letter-spacing:2px;margin-bottom:0.6rem;display:flex;justify-content:space-between;align-items:center}
.sim-label .val{font-size:1.1rem;color:var(--blue);font-family:'Teko',sans-serif;font-weight:700;letter-spacing:1px}
input[type=range]{width:100%;-webkit-appearance:none;height:5px;background:var(--bg4);border-radius:3px;outline:none;cursor:pointer;border:1px solid var(--border2)}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:var(--blue);cursor:pointer;box-shadow:0 0 12px rgba(0,212,255,0.5)}
.range-hints{display:flex;justify-content:space-between;font-size:0.5rem;color:var(--text3);margin-top:5px}
.style-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:0.5rem;margin-top:0.6rem}
.sopt{padding:0.75rem 0.5rem;border:1px solid var(--border2);border-radius:8px;cursor:pointer;text-align:center;font-size:0.58rem;color:var(--text2);text-transform:uppercase;letter-spacing:1px;transition:all 0.2s;background:var(--bg3)}
.sopt .se{font-size:1.4rem;display:block;margin-bottom:0.3rem}
.sopt:hover{border-color:var(--blue);color:var(--text)}
.sopt.sel{border-color:var(--blue);color:var(--blue);background:var(--bluedim)}
.live-preview{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:1rem;margin:1rem 0}
.lp-title{font-size:0.55rem;color:var(--text3);text-transform:uppercase;letter-spacing:2px;margin-bottom:0.75rem}
.lp-row{display:flex;justify-content:space-between;align-items:center;padding:0.35rem 0;border-bottom:1px solid var(--border);font-size:0.65rem}
.lp-row:last-child{border:none}
.lp-cat{color:var(--text2)}
.lp-bar-wrap{flex:1;margin:0 10px;height:3px;background:var(--bg4);border-radius:2px;overflow:hidden}
.lp-bar-inner{height:100%;border-radius:2px;transition:width 0.4s ease}
.lp-total-row{display:flex;justify-content:space-between;font-size:0.7rem;margin-top:0.5rem;padding-top:0.5rem;border-top:1px solid var(--border2)}
.lp-total-label{color:var(--text2);text-transform:uppercase;letter-spacing:2px}
.lp-total-val{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:2px}
.buffalo-alert{background:linear-gradient(135deg,#1a0a14,#200a1a);border:1px solid var(--pink);border-radius:8px;padding:0.75rem;margin-top:0.75rem;font-size:0.62rem;line-height:1.6;animation:pulseborder 2s infinite}
.buffalo-alert strong{color:var(--pink);font-size:0.75rem}
.calc-btn{display:block;width:100%;padding:1.1rem;border:1px solid var(--blue);background:linear-gradient(135deg,var(--bluedim),transparent);border-radius:10px;color:var(--blue);font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:4px;cursor:pointer;transition:all 0.2s;margin-top:1rem}
.calc-btn:hover{background:var(--bluedim);transform:translateY(-2px);box-shadow:0 0 25px rgba(0,212,255,0.2)}
.result-zone{display:none;margin-top:1.5rem;animation:fadeIn 0.5s ease}
.result-zone.show{display:block}
.result-hero{text-align:center;padding:2rem 1rem 1.5rem;background:var(--bg3);border-radius:14px;border:1px solid var(--border2);margin-bottom:1rem;position:relative;overflow:hidden}
.result-hero::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--orange),var(--yellow),var(--green),var(--blue),var(--pink))}
.rh-pre{font-size:0.58rem;color:var(--text2);text-transform:uppercase;letter-spacing:4px;margin-bottom:0.75rem}
.rh-big-line{display:flex;align-items:baseline;justify-content:center;gap:0.4rem;flex-wrap:wrap}
.rh-months{font-family:'Bebas Neue',sans-serif;font-size:clamp(4rem,18vw,9rem);line-height:1;letter-spacing:4px;transition:color 0.5s}
.rh-mois-label{font-family:'Bebas Neue',sans-serif;font-size:clamp(2rem,7vw,4rem);letter-spacing:3px;line-height:1;opacity:0.85}
.rh-days{font-family:'Bebas Neue',sans-serif;font-size:clamp(1.3rem,4vw,2rem);letter-spacing:3px;color:var(--text2);margin-top:0.2rem}
.rh-label{font-size:0.6rem;color:var(--text2);text-transform:uppercase;letter-spacing:4px;margin-top:0.5rem}
.rh-punch{font-size:clamp(0.8rem,2.5vw,1rem);margin-top:1.25rem;padding:0.9rem 1.2rem;background:var(--bg4);border-radius:8px;border-left:4px solid currentColor;line-height:1.7;font-style:italic;text-align:left}
.status-bar-wrap{margin:1rem 0}
.sb-meta{display:flex;justify-content:space-between;font-size:0.58rem;color:var(--text3);margin-bottom:6px}
.sb-track{height:22px;background:var(--bg4);border-radius:11px;overflow:hidden;border:1px solid var(--border)}
.sb-fill{height:100%;border-radius:11px;transition:width 1.2s cubic-bezier(.22,.68,0,1.2)}
.res-breakdown{background:var(--bg3);border-radius:10px;border:1px solid var(--border);padding:1.1rem;margin-top:0.75rem}
.rb-title{font-size:0.55rem;color:var(--text3);text-transform:uppercase;letter-spacing:2px;margin-bottom:0.75rem}
.rb-row{display:flex;justify-content:space-between;align-items:center;padding:0.4rem 0;border-bottom:1px solid var(--border);font-size:0.65rem}
.rb-row:last-child{border:none}
.rb-cat{color:var(--text2)}
.rb-amt{font-family:'Teko',sans-serif;font-size:0.95rem}
.rb-pct{font-size:0.5rem;color:var(--text3);margin-left:6px}
.inflation-note{font-size:0.55rem;color:var(--text3);font-style:italic;margin-top:0.5rem;padding:0.5rem;border:1px solid var(--border);border-radius:6px;line-height:1.6}
.reset-btn{display:block;width:100%;padding:0.8rem;border:1px solid var(--border2);background:transparent;border-radius:8px;color:var(--text3);font-family:'Space Mono',monospace;font-size:0.65rem;cursor:pointer;transition:all 0.2s;margin-top:0.75rem;text-transform:uppercase;letter-spacing:2px}
.reset-btn:hover{border-color:var(--text2);color:var(--text)}
.blink{animation:blink 1s step-end infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
footer{text-align:center;padding:2rem 1rem;font-size:0.55rem;color:var(--text3);letter-spacing:2px;line-height:2}
</style>
</head>
<body>
<div id="scanlines"></div>

<!-- LANG MODAL -->
<div class="lang-modal" id="lang-modal">
  <div class="lang-box">
    <div class="lang-box-title">Farang Kee Nok</div>
    <div class="lang-box-sub">Choose your language / Choisissez votre langue</div>
    <div class="lang-choices">
      <div class="lang-choice fr-choice" onclick="setLang('fr')">
        <span class="lang-flag">🇫🇷</span>
        <div class="lang-name">Français</div>
        <div class="lang-sub">Version française</div>
      </div>
      <div class="lang-choice en-choice" onclick="setLang('en')">
        <span class="lang-flag">🇬🇧</span>
        <div class="lang-name">English</div>
        <div class="lang-sub">British version</div>
      </div>
    </div>
  </div>
</div>

<!-- MINI TOGGLE -->
<div class="lang-toggle">
  <button class="lang-btn active" id="btn-fr" onclick="setLang('fr')">🇫🇷</button>
  <button class="lang-btn" id="btn-en" onclick="setLang('en')">🇬🇧</button>
</div>

<!-- GAME OVER -->
<div class="go-overlay" id="go-overlay">
  <div class="go-box" id="go-box">
    <div class="go-gameover">GAME OVER</div>
    <div class="go-reason" id="go-reason"></div>
    <span class="go-emoji" id="go-emoji">💀</span>
    <div class="go-story" id="go-story"></div>
    <div class="go-loss" id="go-loss"></div>
    <button class="go-btn" id="go-close-btn" onclick="closeGameOver()"></button>
  </div>
</div>

<header>
  <div class="logo">Farang Kee Nok</div>
  <div class="logo-sub">S I M U L A T O R</div>
  <div class="tagline" id="tagline"></div>
  <div class="badge" id="badge"></div>
</header>

<div class="modes">
  <button class="mode-btn mao" onclick="setMode('mao')"><span class="moji">🍺</span><span class="mlabel" id="lbl-mao"></span></button>
  <button class="mode-btn nomad" onclick="setMode('nomad')"><span class="moji">💻</span><span class="mlabel" id="lbl-nomad"></span></button>
  <button class="mode-btn issan" onclick="setMode('issan')"><span class="moji">👰‍♀️</span><span class="mlabel" id="lbl-issan"></span></button>
  <button class="mode-btn sim" onclick="setMode('sim')"><span class="moji">⏳</span><span class="mlabel" id="lbl-sim"></span></button>
</div>

<div class="main">
  <div id="panel-mao" class="panel orange"><div class="ptitle" id="mao-title"></div><div class="egrid" id="mao-grid"></div><div class="total-bar"><div><div class="tlabel" id="mao-total-label"></div><div class="disc" id="mao-disc"></div></div><div class="tamt" style="color:var(--orange)">62 000 ฿</div></div><div class="disc" id="mao-disc2"></div></div>
  <div id="panel-nomad" class="panel greenp"><div class="ptitle" id="nomad-title"></div><div class="egrid" id="nomad-grid"></div><div class="total-bar"><div><div class="tlabel" id="nomad-total-label"></div><div class="disc" id="nomad-disc"></div></div><div class="tamt" style="color:var(--green)">24 000 ฿</div></div><div class="disc" id="nomad-disc2"></div></div>
  <div id="panel-issan" class="panel pinkp"><div class="ptitle" id="issan-title"></div><div class="egrid" id="issan-grid"></div><div class="total-bar"><div><div class="tlabel" id="issan-total-label"></div><div class="disc" id="issan-disc"></div></div><div class="tamt" style="color:var(--pink)">39 000 ฿</div></div><div class="disc" id="issan-disc2"></div></div>
  <div id="panel-sim" class="panel bluep">
    <div class="ptitle" id="sim-title"></div>
    <div class="sim-section">
      <div class="sim-label"><span id="budget-label"></span><span class="val" id="budget-val">40 000 ฿</span></div>
      <input type="range" min="10000" max="200000" step="1000" value="40000" id="budget-range" oninput="onBudgetChange(this.value)">
      <div class="range-hints"><span id="hint-low"></span><span id="hint-high"></span></div>
    </div>
    <div class="sim-section">
      <div class="sim-label" style="margin-bottom:0.5rem"><span id="lifestyle-label"></span></div>
      <div class="style-grid">
        <div class="sopt" id="s-mao" onclick="selectStyle('mao')"><span class="se">🍺</span><span id="sopt-mao"></span></div>
        <div class="sopt sel" id="s-nomad" onclick="selectStyle('nomad')"><span class="se">💻</span><span id="sopt-nomad"></span></div>
        <div class="sopt" id="s-issan" onclick="selectStyle('issan')"><span class="se">👰‍♀️</span><span id="sopt-issan"></span></div>
      </div>
    </div>
    <div class="live-preview"><div class="lp-title" id="lp-title"></div><div id="lp-rows"></div><div class="lp-total-row"><span class="lp-total-label" id="lp-total-label"></span><span class="lp-total-val" id="lp-total" style="color:var(--blue)">—</span></div></div>
    <div id="buffalo-alert-zone"></div>
    <button class="calc-btn" id="calc-btn" onclick="simulate()"></button>
    <div id="result-zone" class="result-zone">
      <div class="result-hero">
        <div class="rh-pre" id="rh-pre"></div>
        <div class="rh-big-line"><div class="rh-months" id="rh-months">—</div><div class="rh-mois-label" id="rh-mois-label" style="color:var(--green)"></div></div>
        <div class="rh-days" id="rh-days"></div>

adette "pour l'école". Cousin qui "travaille dur". Ta femme : yeux de Puss in Boots. <strong>5 téléphones en deux mois.</strong>`,loss:[18000,40000],suffix:'฿ de téléphones pour toute la belle-famille 📱'}],en:[{emoji:'🐃',reason:'THE BUFFALO DIED',story:`The buffalo is dead. <strong>Despite the 50,000 ฿ vet bills you paid last month.</strong> Three-day ceremony: buffet, monks, replacement buffalo required. <strong>Your luck left with your savings.</strong>`,loss:[40000,90000],suffix:'฿ for the buffalo and its funeral 🐃'},{emoji:'🏠',reason:'PARENTS\' HOUSE RENOVATION',story:`Her parents\' house "urgently needs repairs". <strong>Roof, walls, bathroom, kitchen.</strong> Refusing would be "very shameful". <strong>The builder is her mum\'s brother.</strong>`,loss:[60000,150000],suffix:'฿ to renovate someone else\'s house 🏠'},{emoji:'💒',reason:'COUSIN\'S WEDDING — YOU\'RE THE BANK',story:`The cousin is getting married. <strong>You\'re officially the rich farang of the family.</strong> Her mum announced your "gift" before you knew about it. <strong>The whole village knows. You can\'t back out.</strong>`,loss:[15000,45000],suffix:'฿ for a wedding where you were an extra 💒'},{emoji:'🧧',reason:'SONGKRAN FAMILY EDITION',story:`Songkran: <strong>3 days, 40 people to feed, fireworks, outfits, one whole pig.</strong> "Just a few close family." You held the budget until day two. <strong>Then you got the card out.</strong>`,loss:[12000,35000],suffix:'฿ for Songkran family size 🧧'},{emoji:'📱',reason:'YOU\'RE THE VILLAGE APPLE STORE',story:`Mother-in-law: new phone. Father-in-law: wants one too. Big brother. Little sister "for school". Cousin who "works hard". Girlfriend does the Puss in Boots eyes. <strong>5 phones in two months.</strong>`,loss:[18000,40000],suffix:'฿ in phones for the entire family 📱'}]}}

const punchlines={fr:{godmode:['👑 T\'es un vrai roi. La Thaïlande t\'appartient, les éléphants te saluent.','🏆 Respecté. T\'as plus de mois devant toi que de neurones. Profite.','💎 KING STATUS. Tu peux même te payer une belle-mère supplémentaire.'],chill:['😎 T\'as encore de la marge. Tu vas même faire des économies.','🤙 Tranquille boss. La Thaïlande est à toi pour un bon moment.','🌴 La vie est belle. Profite, mais garde un œil sur le buffle.'],decent:['🙂 C\'est correct. T\'as le temps de voir venir.','📊 Ça tient. Évite les imprévus et les amis qui "passent juste deux semaines".','👀 Mais une nuit à Walking Street peut tout changer.'],hmm:['😬 Ça commence à sentir le sapin, bro.','🌡️ Entre tenir et craquer, y\'a juste une bucket list.','⚠️ Commence à préparer un plan B.'],rough:['😰 Tu vas bientôt revendre ton scooter à un Thaï de 16 ans.','🛵 Le scooter part en premier. Ensuite c\'est la dignité.','📉 Mode survie. Street food à 30 ฿. Plus de clim.'],danger:['🆘 Prépare ton billet retour.','📞 Appelle ta mère. Elle savait depuis le début.','💸 La Thaïlande t\'a tout pris.','😭 Instant noodles et Koh Lanta pour te sentir moins seul.'],terminal:['☠️ Appelle ta mère et dis-lui que t\'as perdu.','🪦 Le Farang Kee Nok retourne au nid. Honteux mais vivant.','📺 Ta vie est un épisode de "Français ruinés à l\'étranger" sur M6.']},en:{godmode:['👑 Absolute king. Thailand is yours. The tuk-tuks bow as you pass.','🏆 Respect. You\'ve got more months ahead than brain cells. Enjoy.','💎 KING STATUS. You could even afford a second mother-in-law.'],chill:['😎 You\'ve got plenty of runway. You might even save a bit.','🤙 Sorted, mate. Thailand\'s yours for a good while yet.','🌴 Living the dream. Just keep an eye on the buffalo.'],decent:['🙂 Not bad at all. You\'ve got time to figure it out.','📊 Holding up. Avoid surprises and mates who "just pop over for two weeks".','👀 Decent shape. One night on Walking Street could change everything.'],hmm:['😬 Starting to look a bit dodgy, mate.','🌡️ Between coping and collapsing, there\'s just one bucket list.','⚠️ Don\'t panic, but start thinking about Plan B.'],rough:['😰 You\'ll soon be flogging your scooter to a 16-year-old Thai lad.','🛵 Scooter goes first. Then the fan. Then your self-respect.','📉 Survival mode. Street food only. No AC.'],danger:['🆘 Book the easyJet back to Gatwick. It\'s time.','📞 Ring your mum. She knew from the start.','💸 Thailand took everything. Impressive commitment, tbf.','😭 Pot noodles and reruns of The Beach to feel something.'],terminal:['☠️ Ring your mum and tell her you lost. She\'ll have known for months.','🪦 The Farang Kee Nok is heading home. Skint but breathing.','📺 Your life is now a Jeremy Kyle special. "I blew everything in Thailand."','🛫 The Ryanair flight to Stansted leaves in 6 hours. Leg it.']}};

function renderPanelCards(){['mao','nomad','issan'].forEach(key=>{const cards=panelCards[key][lang];let html='';cards.forEach(c=>{html+=`<div class="ecard${c.pink?' special':''}"><div class="ecat">${c.cat}</div><div class="eamt"${c.pink?` style="color:var(--pink)"`:''}>${c.amt}</div><div class="edesc">${c.desc}</div>${c.warn?`<div class="ewarn">${c.warn}</div>`:''}${c.special?`<div class="especial">${c.special}</div>`:''}${c.badge?`<div class="buffalo-badge">${c.badge}</div>`:''}`;html+='</div>';});document.getElementById(key+'-grid').innerHTML=html;});}

function applyLang(){
  const t=ui[lang];
  const ids={tagline:'tagline',badge:'badge',maoTitle:'mao-title',nomadTitle:'nomad-title',issanTitle:'issan-title',simTitle:'sim-title',budgetLabel:'budget-label',hintLow:'hint-low',hintHigh:'hint-high',lifestyleLabel:'lifestyle-label',soptMao:'sopt-mao',soptNomad:'sopt-nomad',soptIssan:'sopt-issan',lpTitle:'lp-title',lpTotalLabel:'lp-total-label',calcBtn:'calc-btn',rhPre:'rh-pre',rhLabel:'rh-label',sbTitle:'sb-title',rbTitle:'rb-title',resetBtn:'reset-btn',goCloseBtn:'go-close-btn'};
  Object.entries(ids).forEach(([k,id])=>{const el=document.getElementById(id);if(el)el.textContent=t[k]||'';});
  document.getElementById('lbl-mao').innerHTML=t.lblMao;document.getElementById('lbl-nomad').innerHTML=t.lblNomad;document.getElementById('lbl-issan').innerHTML=t.lblIssan;document.getElementById('lbl-sim').innerHTML=t.lblSim;
  document.getElementById('mao-total-label').textContent=t.totalLabel;document.getElementById('nomad-total-label').textContent=t.totalLabel;document.getElementById('issan-total-label').textContent=t.issanTotalLabel;
  document.getElementById('mao-disc').textContent=t.maoDisc;document.getElementById('mao-disc2').textContent=t.maoDisc2;document.getElementById('nomad-disc').textContent=t.nomadDisc;document.getElementById('nomad-disc2').textContent=t.nomadDisc2;document.getElementById('issan-disc').textContent=t.issanDisc;document.getElementById('issan-disc2').textContent=t.issanDisc2;
  document.getElementById('rh-mois-label').textContent=t.rhMois;document.getElementById('footer-text').innerHTML=t.footer;
  renderPanelCards();renderLivePreview();
}

function setLang(l){lang=l;document.getElementById('lang-modal').classList.add('hide');document.getElementById('btn-fr').classList.toggle('active',l==='fr');document.getElementById('btn-en').classList.toggle('active',l==='en');document.getElementById('result-zone').classList.remove('show');applyLang();}

function computeItems(key,budget){const ratio=budget/baseBudget;return profiles[key].items.map((item,i)=>{const f=1+(ratio-1)*item.inflRate*5;return{computed:Math.round(item.base*Math.max(0.7,f)/100)*100,cat:profiles[key].cats[lang][i]};});}
function getPunchline(m){const p=punchlines[lang];let pool=m>=30?p.godmode:m>=15?p.chill:m>=8?p.decent:m>=4?p.hmm:m>=2?p.rough:m>=1?p.danger:p.terminal;return pool[Math.floor(Math.random()*pool.length)];}
function getStatus(m){const sl=ui[lang].statusLabels;if(m>=30)return{pct:98,color:'var(--green)',label:sl.godmode};if(m>=15)return{pct:80,color:'var(--green)',label:sl.chill};if(m>=8)return{pct:60,color:'var(--yellow)',label:sl.decent};if(m>=4)return{pct:38,color:'var(--orange)',label:sl.hmm};if(m>=2)return{pct:20,color:'var(--orange)',label:sl.rough};if(m>=1)return{pct:10,color:'var(--red)',label:sl.danger};return{pct:3,color:'var(--red)',label:sl.terminal};}

function setMode(m){if(currentMode===m){document.getElementById('panel-'+m).classList.remove('visible');document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));currentMode=null;return;}['mao','nomad','issan','sim'].forEach(x=>{document.getElementById('panel-'+x).classList.remove('visible');document.querySelector('.mode-btn.'+x).classList.remove('active');});document.getElementById('panel-'+m).classList.add('visible');document.querySelector('.mode-btn.'+m).classList.add('active');currentMode=m;if(m==='sim')renderLivePreview();}
function selectStyle(s){selectedStyle=s;document.querySelectorAll('.sopt').forEach(el=>el.classList.remove('sel'));document.getElementById('s-'+s).classList.add('sel');renderLivePreview();document.getElementById('result-zone').classList.remove('show');}
function onBudgetChange(v){budgetVal=parseInt(v);const eur=Math.round(budgetVal/EUR_RATE);const sym=lang==='en'?'£':'';const suf=lang==='fr'?' €':'';document.getElementById('budget-val').textContent=budgetVal.toLocaleString('fr-FR')+' ฿ ≈ '+sym+eur.toLocaleString('fr-FR')+suf;renderLivePreview();document.getElementById('result-zone').classList.remove('show');}

function renderLivePreview(){const items=computeItems(selectedStyle,budgetVal),total=items.reduce((s,i)=>s+i.computed,0),maxAmt=Math.max(...items.map(i=>i.computed)),p=profiles[selectedStyle];let html='';items.forEach(item=>{const pct=Math.round((item.computed/total)*100),bp=Math.round((item.computed/maxAmt)*100);html+=`<div class="lp-row"><span class="lp-cat">${item.cat}</span><div class="lp-bar-wrap"><div class="lp-bar-inner" style="width:${bp}%;background:${p.color}44"></div></div><span style="color:${p.color};font-family:'Teko',sans-serif;font-size:0.9rem">${item.computed.toLocaleString('fr-FR')} ฿ <span style="color:var(--text3);font-size:0.5rem">${pct}%</span></span></div>`;});document.getElementById('lp-rows').innerHTML=html;document.getElementById('lp-total').textContent=total.toLocaleString('fr-FR')+' ฿';document.getElementById('lp-total').style.color=p.color;const bzone=document.getElementById('buffalo-alert-zone');if(selectedStyle==='issan')bzone.innerHTML=`<div class="buffalo-alert">${ui[lang].buffaloAlert}</div>`;else bzone.innerHTML='';}

function showGameOver(ev,loss,color){const box=document.getElementById('go-box');box.style.setProperty('--go-color',color);document.getElementById('go-reason').textContent=ev.reason;document.getElementById('go-emoji').textContent=ev.emoji;document.getElementById('go-story').innerHTML=ev.story;document.getElementById('go-loss').textContent=loss.toLocaleString('fr-FR')+' '+ev.suffix;document.getElementById('go-overlay').classList.add('show');}
function closeGameOver(){document.getElementById('go-overlay').classList.remove('show');}

function simulate(){const p=profiles[selectedStyle],items=computeItems(selectedStyle,budgetVal),total=items.reduce((s,i)=>s+i.computed,0),t=ui[lang];let buffaloCost=0,buffaloHit=false;if(p.buffalo&&Math.random()<0.30){buffaloHit=true;buffaloCost=Math.round((30000+Math.random()*50000)/1000)*1000;}let chaosEv=null,chaosLoss=0;if(Math.random()<0.25){const evList=p.chaosEvents[lang];chaosEv=evList[Math.floor(Math.random()*evList.length)];chaosLoss=chaosEv.loss[0]===chaosEv.loss[1]?chaosEv.loss[0]:Math.round((chaosEv.loss[0]+Math.random()*(chaosEv.loss[1]-chaosEv.loss[0]))/500)*500;}const effectiveMonthly=total+(buffaloCost/3)+chaosLoss,months=Math.max(0,budgetVal/effectiveMonthly),fullMonths=Math.floor(months),days=Math.floor((months-fullMonths)*30),status=getStatus(months),punch=getPunchline(months);const mEl=document.getElementById('rh-months'),mlEl=document.getElementById('rh-mois-label');if(months>=120){mEl.textContent='∞';mEl.style.color='var(--green)';mlEl.style.color='var(--green)';}else{mEl.textContent=fullMonths;mEl.style.color=status.color;mlEl.style.color=status.color;}mlEl.textContent=t.rhMois;document.getElementById('rh-days').textContent=months<120?t.rhDaysFn(days):t.rhForever;document.getElementById('rh-days').style.color=status.color;document.getElementById('rh-punch').textContent=punch;document.getElementById('rh-punch').style.color=status.color;document.getElementById('rh-punch').style.borderLeftColor=status.color;document.getElementById('sb-fill').style.width=status.pct+'%';document.getElementById('sb-fill').style.background=status.color;document.getElementById('sb-label').textContent=status.label;document.getElementById('sb-label').style.color=status.color;let rbHtml='';items.forEach(item=>{const pct=Math.round((item.computed/effectiveMonthly)*100);rbHtml+=`<div class="rb-row"><span class="rb-cat">${item.cat}</span><span class="rb-amt" style="color:${p.color}">${item.computed.toLocaleString('fr-FR')} ฿<span class="rb-pct">${pct}%</span></span></div>`;});if(buffaloHit)rbHtml+=`<div class="rb-row" style="border-color:var(--pink)"><span class="rb-cat" style="color:var(--pink)">${t.buffaloRow}</span><span class="rb-amt" style="color:var(--pink)">${buffaloCost.toLocaleString('fr-FR')} ฿<span class="rb-pct">⚡</span></span></div>`;if(chaosEv)rbHtml+=`<div class="rb-row" style="border-color:${p.chaosColor}"><span class="rb-cat" style="color:${p.chaosColor}">${t.chaosRow}</span><span class="rb-amt" style="color:${p.chaosColor}">${chaosLoss.toLocaleString('fr-FR')} ฿<span class="rb-pct">☠️</span></span></div>`;rbHtml+=`<div class="rb-row"><span class="rb-cat" style="color:var(--text);text-transform:uppercase;letter-spacing:1px;font-size:0.6rem">${t.totalEffectif}</span><span class="rb-amt" style="color:var(--text);font-size:1.2rem">${Math.round(effectiveMonthly).toLocaleString('fr-FR')} ฿</span></div>`;document.getElementById('rb-rows').innerHTML=rbHtml;const eurTotal=Math.round(effectiveMonthly/EUR_RATE);let note=t.noteFn(eurTotal.toLocaleString('fr-FR'));if(buffaloHit)note+=t.buffaloNote;if(chaosEv)note+=t.chaosNote(p.chaosColor);document.getElementById('inflation-note').innerHTML=note;document.getElementById('result-zone').classList.add('show');document.getElementById('result-zone').scrollIntoView({behavior:'smooth',block:'nearest'});if(chaosEv)setTimeout(()=>showGameOver(chaosEv,chaosLoss,p.chaosColor),800);}
function resetSim(){document.getElementById('result-zone').classList.remove('show');document.getElementById('budget-range').value=40000;onBudgetChange(40000);selectStyle('nomad');}

applyLang();
</script>
